root_path: "./"  # saved pth ckpt and wandb logging
data_root_path: "./TAGDataset"  # data directory
ckpt_save_path:   # path to save deepspeed ckpt
num_layers: 6    # number of gnn layers
gnn_type: "index"
fuse_type: interleave    # determines how GNN is fused into the LLM choose from {interleave, parallel} parallel is under development.
lr: 0.0003
l2: 0.1
grad_clip: 0.5
num_epochs: 1
last_epochs: 0
batch_size: 1
eval_batch_size: 1
num_workers: 4
seed: 1
offline_log: False
log_project: "GOFA"
exp_name: "gofa"
train_sample_size: -1
eval_sample_size: -1
skip_validation: False
task_names:              # Name of the dataset trained
  - arxiv
base_llm: "mistral7b"
model_name_or_path: "mistralai/Mistral-7B-Instruct-v0.2"  # base Mistral model path or Hugging Face repo id
attn_implementation: "eager"  # force an explicit causal mask for GOFA graph reordering
checkpoint_dir: "./cache_data/model/"  # directory for ICAE/GOFA checkpoint files
use_encoder_cache: False  # cache graph-independent encoder prefix states before the first GNN layer
encoder_cache_dir: "./cache_data/encoder_cache"
encoder_cache_tag: ""
encoder_cache_skip_nog: False  # when True, NOG/prompt nodes are recomputed and not stored in encoder cache
encoder_cache_mode: "boundary"  # boundary caches the layer-26 full hidden state; memory_kv caches memory + text-side KV
encoder_cache_manifest:
  enabled: False
  output_path: ""
  append: False
  log_interval: 20
encoder_cache_verify: False  # when using memory_kv, compare final memory slots against the full encoder path
encoder_cache_verify_tolerance: 0.001  # strict max-absolute threshold; reported as exact_passed
encoder_cache_verify_mean_tolerance: 0.03  # practical verification threshold for mean absolute drift
encoder_cache_verify_p99_tolerance: 0.25  # practical verification threshold for p99 absolute drift
encoder_cache_verify_relative_l2_tolerance: 0.08  # practical verification threshold for relative L2 drift
encoder_cache_verify_max_tolerance: 1.5  # practical guardrail for rare BF16 outliers
encoder_cache_verify_log_interval: 1
encoder_cache_verify_quantile_sample_size: 1000000  # deterministic sample cap for p95/p99 and above-threshold ratio
profile_stage_times: False  # synchronize CUDA and print encoder/decoder stage timing percentages
profile_stage_log_interval: 50
profile_memory_kv_transformer_breakdown: False  # diagnostic-only detailed breakdown for cached suffix transformer
scheme_b_quant:
  enabled: False
  base_bits: 8
  delta_bits: 4
  static_high_ratio: 0.1
  static_mid_ratio: 0.4
  target_aware_delta: True
  cache_dir: ""  # optional quantized cache root; runtime reads cache_dir/<cache_tag>/<prefix>/<key>.pt
  fake_quant: True  # set False, or base_bits=16, for identity/debug cache conversion
  debug_zero_base: False
  strict: True
scheme_b_weight_quant:
  enabled: False
  bits: 4
  target: "suffix_transformer"  # only suffix_transformer is supported for now
  fake_quant: True
  quantize_attention: True
  quantize_mlp: True
  quantize_layernorm: False
  log_quantized_modules: True
scheme_b_activation_quant:
  enabled: False
  bits: 8
  target: "suffix_transformer"  # only suffix_transformer is supported for now
  fake_quant: True
  quantize_attention: True
  quantize_q_proj: True
  quantize_k_proj: True
  quantize_v_proj: True
  quantize_o_proj: True
  quantize_mlp: True
  quantize_qkv_outputs: False
  quantize_attn_output: False
  quantize_mlp_output: False
  per_token: True
  clip_ratio: 1.0
  q_proj_bits:
  k_proj_bits:
  v_proj_bits:
  o_proj_bits:
  mlp_bits:
  log_quantized_modules: True
scheme_b_activation_observer:
  enabled: False
  output_dir: ""
  max_batches: 2
  max_items_per_module: 4
  target: "suffix_transformer"
  layers: [26, 29, 31]
  projections: ["q_proj", "k_proj", "v_proj", "o_proj", "mlp"]
  save_tensor: True
  save_stats: True
  sample_tokens: 512
  sample_channels: 256
  compute_quant_error: True
  quant_bits: [4, 8]
  per_token: True
  clip_ratio: 1.0
  log_interval: 20
scheme_b_ablation:
  enabled: False
  mode: "none"  # options: none, target_only_zero_others
  zero_memory_state: True
  zero_text_kv: True
  zero_edge_cache: True
  keep_target_edges: False
  log_interval: 20
llm_max_length: 128
val_interval:      # validate per {val_interval} training steps.
mode: "decode"
print_generation_samples: 0  # set -1 to print every generated sample, or N to print the first N samples
max_nodes_per_hop: 5
grad_acc_step: 8
save_model:
  save: False
  steps:
  monitor: False
  time: 5
  epochs:
  top_k: -1
  last: True
load_dir: "./best_ckpt.pth"
load_model: False
last_save: False
training_precision: "bf16-mixed"
ckpt_path:
run_mode: "pretrain"
dec_lora: False   # Set to True to tune decoder by LoRA.
