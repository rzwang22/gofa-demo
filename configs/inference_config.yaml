run_mode: "inf"
num_epochs: 0
mode: generate
model_name_or_path: /home/rzwang/data/GOFA/cache_data/model/Mistral-7B-Instruct-v0.2
checkpoint_dir: /home/rzwang/data/GOFA/cache_data/model
load_dir: /home/rzwang/data/GOFA/cache_data/model/nb_instruct.pth
load_model: True
batch_size: 1
use_encoder_cache: False
encoder_cache_mode: "memory_kv"
encoder_cache_manifest:
  enabled: False
  output_path: ""
  append: False
  log_interval: 20
scheme_b_quant:
  enabled: False
  base_bits: 8
  delta_bits: 4
  memory_base_bits:
  key_base_bits:
  value_base_bits:
  memory_delta_bits:
  key_delta_bits:
  value_delta_bits:
  static_high_ratio: 0.1
  static_mid_ratio: 0.4
  target_aware_delta: True
  target_aware_policy: "target_1hop"
  target_delta_hops: 1
  keep_target_edges: True
  local_degree_top_ratio: 0.0
  local_degree_threshold:
  max_delta_items_per_batch:
  cache_dir: ""
  fake_quant: True
  debug_zero_base: False
  strict: True
  load_key_base: True
  load_value_base: True
  kv_base_load_policy: "all"
  kv_base_target_hops: 1
  kv_base_local_degree_top_ratio: 0.0
  kv_base_local_degree_threshold:
  kv_base_keep_target_edges: True
  load_memory_delta: True
  load_key_delta: True
  load_value_delta: True
scheme_b_weight_quant:
  enabled: False
  bits: 4
  target: "suffix_transformer"
  fake_quant: True
  quantize_attention: True
  quantize_mlp: True
  quantize_layernorm: False
  log_quantized_modules: True
scheme_b_activation_quant:
  enabled: False
  bits: 8
  target: "suffix_transformer"
  fake_quant: True
  quantize_attention: True
  quantize_q_proj: True
  quantize_k_proj: True
  quantize_v_proj: True
  quantize_o_proj: True
  quantize_mlp: True
  quantize_qkv_outputs: False
  quantize_attn_output: False
  quantize_mlp_output: False
  per_token: True
  clip_ratio: 1.0
  q_proj_bits:
  k_proj_bits:
  v_proj_bits:
  o_proj_bits:
  mlp_bits:
  log_quantized_modules: True
scheme_b_int_gemm:
  enabled: False
  target: "suffix_transformer"
  weight_bits: 4
  activation_bits: 8
  backend: "torch_int_mm"
  quantize_attention: True
  quantize_mlp: True
  quantize_layernorm: False
  fallback_to_fake_quant: False
  log_modules: True
  log_interval: 20
scheme_b_quant_kv_attention:
  enabled: False
  backend: "torch_int_mm_qscale_fold"
  key_scale_fold_into_q: True
  quantize_query_bits: 8
  key_bits: 4
  value_bits: 4
  use_int_qk: True
  pv_compute_mode: "scale_delayed_v"
  quantize_prob_bits: 8
  prob_quant_granularity: "per_query"
  prob_quant_unsigned: False
  prob_quant_qmax: 127
  fallback_to_fp_attention: False
  fallback_to_scale_delayed_v: False
  compare_int_pv_with_fp_pv: False
  log_interval: 20
scheme_b_activation_observer:
  enabled: False
  output_dir: ""
  max_batches: 2
  max_items_per_module: 4
  target: "suffix_transformer"
  layers: [26, 29, 31]
  projections: ["q_proj", "k_proj", "v_proj", "o_proj", "mlp"]
  save_tensor: True
  save_stats: True
  sample_tokens: 512
  sample_channels: 256
  compute_quant_error: True
  quant_bits: [4, 8]
  per_token: True
  clip_ratio: 1.0
  log_interval: 20
scheme_b_ablation:
  enabled: False
  mode: "none"
  zero_memory_state: True
  zero_text_kv: True
  zero_edge_cache: True
  keep_target_edges: False
  log_interval: 20

num_layers: 6
gnn_type: "index"
fuse_type: interleave
dec_lora: True

sample_size_per_task: 100    # control the train sample size per task
llm_max_length: 256
train_task_names:
  - cora_link
hops: 3              # number of hops when sampling subgraphs
train_max_nodes_per_hops: 5        # number of neighbor nodes per hop.
ways: 2             # number of sampled classes for classification
instructs: True        # include instruction example text in the prompt
selections: True        # include class candidate name in the prompt


# same set of parameters but for inference.
eval_task_names:
  - cora_link
inf_sample_size_per_task: 
  - 1
inf_hops:
  - 3
inf_max_nodes_per_hops:
  - 10
inf_ways:
  - 2
inf_instructs:
  - True
inf_selections:
  - True
