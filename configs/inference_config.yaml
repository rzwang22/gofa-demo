run_mode: "inf"
num_epochs: 0
mode: generate
model_name_or_path: /home/rzwang/data/GOFA/cache_data/model/Mistral-7B-Instruct-v0.2
checkpoint_dir: /home/rzwang/data/GOFA/cache_data/model
load_dir: /home/rzwang/data/GOFA/cache_data/model/nb_instruct.pth
load_model: True
batch_size: 1
use_encoder_cache: False
encoder_cache_mode: "memory_kv"
encoder_cache_manifest:
  enabled: False
  output_path: ""
  append: False
  log_interval: 20
scheme_b_quant:
  enabled: False
  base_bits: 8
  delta_bits: 4
  static_high_ratio: 0.1
  static_mid_ratio: 0.4
  target_aware_delta: True
  cache_dir: ""
  fake_quant: True
  debug_zero_base: False
  strict: True
scheme_b_weight_quant:
  enabled: False
  bits: 4
  target: "suffix_transformer"
  fake_quant: True
  quantize_attention: True
  quantize_mlp: True
  quantize_layernorm: False
  log_quantized_modules: True
scheme_b_ablation:
  enabled: False
  mode: "none"
  zero_memory_state: True
  zero_text_kv: True
  zero_edge_cache: True
  keep_target_edges: False
  log_interval: 20

num_layers: 6
gnn_type: "index"
fuse_type: interleave
dec_lora: True

sample_size_per_task: 100    # control the train sample size per task
llm_max_length: 256
train_task_names:
  - cora_link
hops: 3              # number of hops when sampling subgraphs
train_max_nodes_per_hops: 5        # number of neighbor nodes per hop.
ways: 2             # number of sampled classes for classification
instructs: True        # include instruction example text in the prompt
selections: True        # include class candidate name in the prompt


# same set of parameters but for inference.
eval_task_names:
  - cora_link
inf_sample_size_per_task: 
  - 1
inf_hops:
  - 3
inf_max_nodes_per_hops:
  - 10
inf_ways:
  - 2
inf_instructs:
  - True
inf_selections:
  - True
